name: CD - Deploy to Cloud Run

on:
  push:
    branches: [ main ]
  pull_request:
    types: [ closed ]
    branches: [ main ]

jobs:
  deploy:
    if: github.event_name == 'push' || (github.event.pull_request && github.event.pull_request.merged == true)
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Configure Docker
        run: gcloud auth configure-docker southamerica-east1-docker.pkg.dev

      # ==================== BACKEND API ====================
      - name: Build and push Backend image
        run: |
          IMAGE_BACKEND=southamerica-east1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/height-estimator-repo/height-estimator-api:${{ github.sha }}
          docker build -t $IMAGE_BACKEND -f api/Dockerfile.api ./api
          docker push $IMAGE_BACKEND

      - name: Deploy Backend to Cloud Run
        run: |
          gcloud run deploy ${{ secrets.CLOUD_RUN_SERVICE_BACKEND }} \
            --image $IMAGE_BACKEND \
            --region southamerica-east1 \
            --platform managed \
            --allow-unauthenticated \
            --port=8000 \
            --quiet

      # ==================== FRONTEND SHINY ====================
      - name: Build and push Frontend image
        run: |
          IMAGE_FRONTEND=southamerica-east1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/height-estimator-repo/height-estimator-frontend:${{ github.sha }}
          docker build -t $IMAGE_FRONTEND -f frontend/Dockerfile.shiny ./frontend
          docker push $IMAGE_FRONTEND

      - name: Deploy Frontend to Cloud Run
        run: |
          gcloud run deploy ${{ secrets.CLOUD_RUN_SERVICE_FRONTEND }} \
            --image $IMAGE_FRONTEND \
            --region southamerica-east1 \
            --platform managed \
            --allow-unauthenticated \
            --port=3838 \
            --quiet