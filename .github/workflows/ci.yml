name: R CI Pipeline

on:
  push:
    branches: [ main ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2

      - name: Install dependencies
        run: |
          Rscript -e 'install.packages("plumber", repos="https://cloud.r-project.org")'
          Rscript -e 'install.packages("mirt", repos="https://cloud.r-project.org")'
          Rscript -e 'install.packages("testthat", repos="https://cloud.r-project.org")'
          Rscript -e 'install.packages("httr", repos="https://cloud.r-project.org")'
          Rscript -e 'install.packages("jsonlite", repos="https://cloud.r-project.org")'

      - name: Start API
        run: |
          Rscript api/plumber.R &

      - name: Wait for API
        run: sleep 10

      - name: Run tests
        run: |
          Rscript -e 'testthat::test_dir("tests")'