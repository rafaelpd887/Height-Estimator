name: R CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4'  # ou 'release' para a mais recente estável

      - name: Install system dependencies (for httr, curl, xml2 etc.)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev \
            libfontconfig1-dev \
            libharfbuzz-dev \
            libfribidi-dev \
            libfreetype6-dev \
            libpng-dev \
            libtiff5-dev \
            libjpeg-dev

      - name: Install R dependencies (from DESCRIPTION if exists)
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          cache: true
          extra-packages: |
            any::testthat
            any::httr
            any::jsonlite
            local::.  # instala o seu próprio pacote se for um package

      # Alternativa se NÃO tiver DESCRIPTION: descomente e use isso em vez do passo acima
      # - name: Install required packages manually
      #   run: |
      #     install.packages(c("plumber", "mirt", "testthat", "httr", "jsonlite"),
      #                      repos = "https://packagemanager.posit.co/cran/__linux__/jammy/latest")

      - name: Start Plumber API in background
        run: |
          nohup Rscript api/plumber.R > plumber.log 2>&1 &
          echo $! > api.pid
          sleep 15  # dá mais tempo pro servidor subir

      - name: Wait for API to be ready
        run: |
          for i in {1..30}; do
            if curl -s --fail http://localhost:8000/__docs__/ >/dev/null || curl -s --fail http://localhost:8000/health >/dev/null; then
              echo "API is up!"
              exit 0
            fi
            echo "Waiting for API... ($i/30)"
            sleep 2
          done
          echo "API failed to start"
          cat plumber.log
          exit 1

      - name: Run tests
        run: Rscript -e 'testthat::test_dir("tests")'

      - name: Show Plumber logs if failed (debug)
        if: failure()
        run: cat plumber.log || true