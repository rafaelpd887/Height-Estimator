name: R CI Pipeline

on:
  push:
    branches: [ dev ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4'  

      - name: Install system dependencies (essencial para httr, curl, xml2, mirt etc.)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev \
            libfontconfig1-dev \
            libharfbuzz-dev \
            libfribidi-dev \
            libfreetype6-dev \
            libpng-dev \
            libtiff5-dev \
            libjpeg-dev \
            libblas-dev \
            liblapack-dev \
            gfortran

      - name: Install R packages manually
        run: |
          Rscript -e "install.packages(c(
            'plumber',
            'mirt',
            'httr',
            'jsonlite',
            'testthat',
            'here',
            'readr',
            'dplyr',
            'tibble',
            'purrr',
            'fs',
            'logger'
          ), repos = 'https://packagemanager.posit.co/cran/__linux__/jammy/latest', dependencies = TRUE)"

      - name: Start Plumber API in background
        run: |
          nohup Rscript api/plumber.R > plumber.log 2>&1 &
          echo $! > api.pid
          sleep 20  

      - name: Wait for API to be ready
        run: |
          for i in {1..40}; do
            if curl --fail -s http://localhost:8000/health > /dev/null; then
              echo "API is up! /health returned OK"
              exit 0
            fi
            echo "Waiting for API... ($i/40)"
            sleep 3
          done
          echo "API failed to start. Logs:"
          cat plumber.log
          exit 1

      - name: Run tests
        run: Rscript -e 'testthat::test_dir("tests")'

      - name: Stop Plumber API
        if: always()
        run: |
          sleep 5  
          kill $(cat api.pid) || true

      - name: Show Plumber logs on failure (debug)
        if: failure()
        run: cat plumber.log || true
